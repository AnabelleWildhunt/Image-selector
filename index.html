<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Cream+Soda&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
    <title>Image selector</title>
</head>
<body>
    
    <header class="flex">
        <img src="img/title-icon.svg" alt="image icon">
        <h1>Image selector</h1>
    </header>

    <nav>
        <ul class="flex navbar">
            <li aria-label="link" data-anchor="">MAIN PAGE</li>
            <li aria-label="link" data-anchor="">MANAGE</li>
            <li aria-label="link" data-anchor="">SIGN IN</li>
            <li aria-label="link" data-anchor="">REGISTER</li>
        </ul>
    </nav>

    <main class="flex">
        
        <section>
            <div class="flex" id="images">
                <span class="pseudo-option" data-tag="testy">test 1</span>
                <span class="pseudo-option" data-tag="testier">test 2</span>
                <span class="pseudo-option" data-tag="testy">test 3</span>
            </div>
        </section>

        <div class="flex checkbox-container">
            <label for="is-gif">Is a gif?</label>
            <input type="checkbox" name="is-gif" id="is-gif">
        </div>

        <button class="btn">Get image~!</button>

    </main>

    <footer>

    </footer>

<script src="script.js" type="module"></script>
</body>
</html>
